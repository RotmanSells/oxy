services:
  - type: web
    name: oxy-api
    runtime: node
    rootDir: api
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://rotmansells.github.io
      - key: SITE_URL
        value: https://rotmansells.github.io/oxy/
      - key: DB_PATH
        value: /var/data/leads.db
      - key: OPENAI_MODEL
        value: minimax-m2
      - key: OPENAI_BASE_URL
        value: https://api.hydraai.ru/v1
      - key: BOT_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
    disk:
      name: oxy-api-data
      mountPath: /var/data
      sizeGB: 1
